<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Food</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<div class="card p-3 mt-4">
    <h3>Customize Your Order</h3>

    <label>Quantity</label>
    <input type="number" id="qty" value="1" min="1" class="form-control" onchange="calculatePrice()">

    <br>

    <label>Spice Level</label>
    <select id="spice" class="form-control">
        <option>Mild</option>
        <option>Medium</option>
        <option>Spicy</option>
    </select>

    <br>

    <label>
        <input type="checkbox" id="cheese" onchange="calculatePrice()">
        Extra Cheese (+₹50)
    </label>

    <br><br>

    <label>Special Instructions</label>
    <textarea id="note" class="form-control" placeholder="Example: No Onion"></textarea>

    <br>

    <h4>Total: ₹<span id="total">250</span></h4>

    <button class="btn btn-success mt-2" onclick="placeOrder()">
        Add To Cart
    </button>
</div>

<script>
let basePrice = 250;

function calculatePrice() {
    let qty = parseInt(document.getElementById("qty").value);
    let total = basePrice * qty;

    if(document.getElementById("cheese").checked){
        total += 50 * qty;
    }

    document.getElementById("total").innerHTML = total;
}

function placeOrder() {
    let qty = document.getElementById("qty").value;
    let spice = document.getElementById("spice").value;
    let cheese = document.getElementById("cheese").checked ? "Yes" : "No";
    let note = document.getElementById("note").value;
    let total = document.getElementById("total").innerHTML;

    alert(
        "Order Added!\n\n" +
        "Quantity: " + qty +
        "\nSpice: " + spice +
        "\nExtra Cheese: " + cheese +
        "\nNote: " + note +
        "\nTotal: ₹" + total
    );
}
</script>

</body>
</html>
