<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Food Order</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:linear-gradient(135deg,#ff9966,#ff5e62);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    font-family:Arial, Helvetica, sans-serif;
}

.order-card{
    max-width:900px;
    width:100%;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.food-img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.details{
    padding:35px;
}

.price{
    font-size:30px;
    color:#ff5722;
    font-weight:bold;
}

.qty-box{
    display:flex;
    align-items:center;
    gap:15px;
}

.qty-btn{
    width:45px;
    height:45px;
    border:none;
    background:#ff5722;
    color:white;
    font-size:22px;
    border-radius:50%;
    transition:.3s;
}

.qty-btn:hover{
    background:#e64a19;
}

.qty{
    font-size:26px;
    font-weight:bold;
    width:50px;
    text-align:center;
}

.total{
    font-size:28px;
    font-weight:bold;
    color:green;
}

.btn-order{
    width:100%;
    padding:15px;
    font-size:20px;
    border-radius:50px;
    background:#ff5722;
    border:none;
}

.btn-order:hover{
    background:#e64a19;
}

.form-control{
    border-radius:10px;
}

@media(max-width:768px){

.food-img{
height:250px;
}

.details{
padding:25px;
}

}

</style>

</head>
<body>

<div class="order-card">

<div class="row g-0">

<div class="col-lg-5">

<img src="https://img.magnific.com/premium-vector/3d-cola-with-fries-cheeseburger-paper-bag_169241-10663.jpg?semt=ais_hybrid&w=740&q=80"
class="food-img" alt="Delicious Dish">

</div>

<div class="col-lg-7">

<div class="details">

<h2 class="fw-bold">Your Meal 🍽️</h2>

<p class="text-muted">
confirmed your tasty meal 
</p>

<div class="price mb-3">
₹199
</div>

<hr>

<h5>Customer Details</h5>

<input type="text" class="form-control mb-3" placeholder="Your Name">

<input type="tel" class="form-control mb-3" placeholder="Phone Number">

<textarea class="form-control mb-3" rows="3"
placeholder="Delivery Address"></textarea>

<hr>

<h5>Quantity</h5>

<div class="qty-box my-3">

<button class="qty-btn" onclick="decrease()">−</button>

<div class="qty" id="qty">1</div>

<button class="qty-btn" onclick="increase()">+</button>

</div>

<h3 class="total">
Total : ₹<span id="total">199</span>
</h3>

<button class="btn btn-order text-white mt-4">
Place Order
</button>

</div>

</div>

</div>

</div>

<script>

let quantity = 1;
const price = 199;

function updateTotal(){
document.getElementById("qty").innerHTML = quantity;
document.getElementById("total").innerHTML = quantity * price;
}

function increase(){
quantity++;
updateTotal();
}

function decrease(){
if(quantity>1){
quantity--;
updateTotal();
}
}

</script>

</body>
</html>
